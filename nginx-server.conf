# PlayMaker JO — Nginx reverse proxy config
# Copy to /etc/nginx/sites-available/playmakerjo on the VPS
# Then: ln -s /etc/nginx/sites-available/playmakerjo /etc/nginx/sites-enabled/
# Then: certbot --nginx (to add SSL automatically)

# ── API Backend ──
server {
    listen 80;
    server_name api.playmakerjo.com;

    client_max_body_size 5M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── Admin Dashboard ──
server {
    listen 80;
    server_name admin.playmakerjo.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
